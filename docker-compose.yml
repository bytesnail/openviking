services:
  openviking:
    image: openviking/openviking:latest
    container_name: openviking
    network_mode: host
    env_file:
      - secrets.env
    volumes:
      - /mnt/hdd/tools/openviking/ov.conf:/app/.openviking/ov.conf
      - /mnt/hdd/tools/openviking/workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
