{
  "storage": {
    "workspace": "/app/workspace",
    "vectordb": {
      "name": "context",
      "backend": "local"
    },
    "agfs": {
      "backend": "local"
    }
  },
  "server": {
    "host": "127.0.0.1",
    "auth_mode": "api_key",
    "root_api_key": "${OPENVIKING_ROOT_API_KEY}"
  },
  "log": {
    "level": "INFO",
    "output": "stdout"
  },
  "embedding": {
    "dense": {
      "provider": "openai",
      "api_base": "http://127.0.0.1:8021/v1",
      "model": "Qwen3-Embedding-0.6B.i1-Q6_K.gguf",
      "dimension": 1024,
      "input": "text",
      "query_param": "query",
      "document_param": "document"
    },
    "text_source": "content_only",
    "max_input_tokens": 6144,
    "max_concurrent": 10
  },
  "rerank": {
    "provider": "openai",
    "api_base": "http://127.0.0.1:8022/v1/rerank",
    "api_key": "no-key",
    "model": "qwen3-reranker-0.6b-q8_0.gguf"
  },
  "vlm": {
    "provider": "kimi",
    "api_base": "https://api.kimi.com/coding/v1",
    "api_key": "${OPENVIKING_VLM_API_KEY}",
    "model": "kimi-for-coding",
    "temperature": 1,
    "max_tokens": 131072,
    "timeout": 1200,
    "thinking": true,
    "max_concurrent": 10
  },
  "query_planner": {
    "provider": "kimi",
    "api_base": "https://api.kimi.com/coding/v1",
    "api_key": "${OPENVIKING_VLM_API_KEY}",
    "model": "kimi-for-coding",
    "temperature": 1,
    "max_tokens": 65536,
    "timeout": 600,
    "thinking": true,
    "max_concurrent": 10
  }
}